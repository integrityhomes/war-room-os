name: Lead Intelligence Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [agent/intelligent-lead-manager]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Compile application
        run: python -m py_compile app.py lead_intelligence.py xleads_adapter.py lead_intelligence/__init__.py
      - name: Run tests
        run: pytest -q
