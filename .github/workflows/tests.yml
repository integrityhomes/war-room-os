name: Lead Intelligence Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [agent/intelligent-lead-manager]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -q -r requirements.txt pytest
      - name: Compile application
        run: python -m py_compile app.py lead_intelligence.py xleads_adapter.py lead_intelligence/__init__.py
      - name: Run tests
        id: pytest
        continue-on-error: true
        run: |
          pytest -vv --tb=short > test-results.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lead-test-results
          path: test-results.txt
      - name: Fail if tests failed
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1
